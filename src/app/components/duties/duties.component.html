<!-- duties.component.html -->
<section id="duties" class="duties">
  <h2>What I Covered</h2>
  <div class="grid">
    @for (d of duties(); track d.title) {
      <div class="card">
        <span class="tag">{{ d.category }}</span>
        <h3>{{ d.title }}</h3>
        <p>{{ d.description }}</p>
      </div>
    }
  </div>
</section>
